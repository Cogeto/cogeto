# Cogeto per-tenant stack (Addendum §A.2: `docker compose up` is the contract).
# Eight containers (incl. the receive-only inbound mail server, Session O4) plus
# one-shot init jobs plus an optional redaction profile (decision 0003 ruling 5).
# Works with zero configuration on a fresh clone; every variable can be
# overridden via .env (see .env.example).

name: cogeto

services:
  # ── Edge ────────────────────────────────────────────────────────────────────
  caddy:
    build:
      context: .
      dockerfile: project/infra/docker/Dockerfile
      target: caddy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:2019/config/']
      interval: 5s
      timeout: 3s
      retries: 12
    depends_on:
      app:
        condition: service_healthy
      zitadel:
        condition: service_healthy
    restart: unless-stopped

  # ── Application processes (same image, different commands) ─────────────────
  app:
    build:
      context: .
      dockerfile: project/infra/docker/Dockerfile
      target: runtime
    command: ['node', 'project/src/dist/entrypoints/app.js']
    environment: &cogeto-env
      COGETO_HTTP_PORT: 3000
      COGETO_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-cogeto-dev-password}@postgres:5432/cogeto
      COGETO_QDRANT_URL: http://qdrant:6333
      # Qdrant API key (QS-4). Empty on the default internal-only stack; set it
      # (and it is applied to the qdrant service) before exposing Qdrant.
      COGETO_QDRANT_API_KEY: ${COGETO_QDRANT_API_KEY:-}
      COGETO_S3_URL: http://minio:9000
      # Browser-reachable S3 origin for presigned download URLs (§A.9, O1;
      # decision 0017): served by Caddy at https://s3.localhost with the Host
      # header preserved, so MinIO's SigV4 host check matches. Add the local DNS
      # entry (see decision 0017) before downloads resolve in the browser.
      COGETO_S3_PUBLIC_URL: ${COGETO_S3_PUBLIC_URL:-https://s3.localhost}
      # Object-storage credentials + bucket for the memory module's S3 client
      # (deletion saga object removal, encryption health check — decision 0008).
      COGETO_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-cogeto}
      COGETO_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-cogeto-dev-password}
      COGETO_S3_BUCKET: cogeto
      # Instance signing keypair (deletion receipts, §B.1) — generated by the
      # migrate init job on first boot. QS-9: the internet-facing app mounts
      # ONLY the public half (see volumes below) and asserts the private key is
      # absent at boot; the worker keeps the full pair.
      COGETO_INSTANCE_KEY_DIR: /instance-keys
      COGETO_ASSERT_NO_PRIVATE_KEY: '1'
      COGETO_OIDC_ISSUER: https://${COGETO_EXTERNAL_DOMAIN:-localhost}
      COGETO_OIDC_INTERNAL_URL: http://zitadel:8080
      COGETO_OIDC_EXTERNAL_DOMAIN: ${COGETO_EXTERNAL_DOMAIN:-localhost}
      COGETO_WEB_CONFIG_FILE: /web-config/config.json
      # Optional: without it the model gateway boots unconfigured and fails on use
      # with a typed error. Model calls start with the Notes pipeline (Session 2).
      COGETO_MISTRAL_API_KEY: ${COGETO_MISTRAL_API_KEY:-}
      # Per-task model tiers (decision 0007 ruling 3) and the embedding model —
      # each falls back to the config default when unset.
      COGETO_MISTRAL_MODEL_PIPELINE: ${COGETO_MISTRAL_MODEL_PIPELINE:-}
      COGETO_MISTRAL_MODEL_ANSWER: ${COGETO_MISTRAL_MODEL_ANSWER:-}
      COGETO_MISTRAL_EMBED_MODEL: ${COGETO_MISTRAL_EMBED_MODEL:-}
      COGETO_LOG_LEVEL: ${COGETO_LOG_LEVEL:-info}
      # Ana sandbox (decision 0022). Off by default and FAIL-CLOSED (QS-3):
      # serving the pre-minted demo session (a token published to anyone) now
      # requires an EXPLICIT COGETO_DEMO_MODE=1 — the app never flips to sandbox
      # mode from the mere presence of a session file. So the demo profile is:
      #   COGETO_DEMO_MODE=1 docker compose --profile demo up
      # COGETO_PRODUCTION=1 hard-refuses the demo seed/reset. NEVER set demo mode
      # on a customer instance.
      COGETO_DEMO_MODE: ${COGETO_DEMO_MODE:-}
      COGETO_PRODUCTION: ${COGETO_PRODUCTION:-}
      COGETO_DEMO_RESET_CRON: ${COGETO_DEMO_RESET_CRON:-0 */6 * * *}
      # Redaction mode (§B.8, profile redaction). Off by default. Set
      # REDACTION_ENABLED=1 (with the profile up) to pseudonymize every outbound
      # model call; the gateway then fails closed if the sidecar is unreachable.
      REDACTION_ENABLED: ${REDACTION_ENABLED:-}
      REDACTION_URL: ${REDACTION_URL:-http://redaction:8080}
      # QS-21 fail-closed assertion: set to 1 to REFUSE boot unless redaction is
      # actually enabled — bringing the redaction profile up while forgetting
      # REDACTION_ENABLED=1 then fails loudly at boot instead of silently sending
      # plaintext to the model provider.
      REDACTION_REQUIRED: ${REDACTION_REQUIRED:-}
      # Inbound email (Session O4, decision 0028; sender routing per decision
      # 0031). The instance's unique inbound address (ruling 1), the size caps
      # (ruling 6), the shared secret the Haraka queue hook presents to the
      # internal intake (ruling 7), and the SMTP listener address for the app's
      # mail health probe. The DEV token below is for localhost only —
      # provisioning (O6) generates a real one per instance and sets it on BOTH
      # the app and the mail service.
      COGETO_MAIL_INBOUND_ADDRESS: ${COGETO_MAIL_INBOUND_ADDRESS:-capture@in.localhost}
      COGETO_MAIL_MAX_BYTES: ${COGETO_MAIL_MAX_BYTES:-26214400}
      COGETO_MAIL_ATTACHMENTS_MAX_BYTES: ${COGETO_MAIL_ATTACHMENTS_MAX_BYTES:-26214400}
      COGETO_MAIL_INTAKE_TOKEN: ${COGETO_MAIL_INTAKE_TOKEN:-cogeto-dev-mail-token}
      # The bootstrap admin's login email — the operator account is excluded
      # from sender-routed email capture (decision 0031). Must match the
      # Zitadel FirstInstance admin below.
      COGETO_ADMIN_USER_EMAIL: ${ZITADEL_ADMIN_USERNAME:-admin@cogeto.localhost}
      COGETO_MAIL_SMTP_ADDRESS: ${COGETO_MAIL_SMTP_ADDRESS:-mail:2525}
    volumes:
      - web-config:/web-config:ro
      # QS-9: the app mounts the PUBLIC-KEY-ONLY volume (migrate copies the public
      # half here) — an RCE in the internet-facing app cannot exfiltrate the
      # receipt-signing private key. The worker mounts the full instance-keys.
      - instance-pubkey:/instance-keys:ro
      # Empty on a normal instance (no session file → no demo mode); the
      # demo-seed job (profile demo) writes the demo Principal's session here.
      - demo-config:/demo-config:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      zitadel:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      zitadel-init:
        condition: service_completed_successfully
      preflight:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: project/infra/docker/Dockerfile
      target: runtime
    command: ['node', 'project/src/dist/entrypoints/worker.js']
    environment:
      <<: *cogeto-env
      # QS-39: run the worker's graphile crons in UTC so the 03:00/03:30/03:40
      # nightly schedule is timezone-stable and a DST transition never skips or
      # double-fires a run (the single-flight advisory lock also guards the
      # double-fire). The app carries no crons, so only the worker pins TZ.
      TZ: UTC
    volumes:
      # The worker keeps the FULL keypair (it signs receipts) — QS-9.
      - instance-keys:/instance-keys:ro
      # Demo scheduled reset (decision 0022) reuses the session the seed wrote.
      - demo-config:/demo-config:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const s=require('fs').statSync('/tmp/worker-heartbeat');process.exit(Date.now()-s.mtimeMs<30000?0:1)"
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      preflight:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── One-shot init jobs ──────────────────────────────────────────────────────
  # Refuses to boot if a known DEV secret guards a non-localhost deployment
  # (QS-8). Runs before zitadel/migrate/app/worker and is the ONLY process handed
  # every secret (Postgres/MinIO/Zitadel/KMS), so it enforces the rule
  # instance-wide. A no-op on a localhost dev box.
  preflight:
    build:
      context: .
      dockerfile: project/infra/docker/Dockerfile
      target: runtime
    command: ['node', 'project/src/dist/entrypoints/preflight.js']
    environment:
      COGETO_EXTERNAL_DOMAIN: ${COGETO_EXTERNAL_DOMAIN:-localhost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cogeto-dev-password}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cogeto-dev-password}
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY:-cogeto-dev-key:bxaADytwX4au7d/HYGegSGd0uloQlb30uz6Vh5opUvg=}
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}
      ZITADEL_DB_PASSWORD: ${ZITADEL_DB_PASSWORD:-zitadel-dev-password}
      ZITADEL_ADMIN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:-DevPassword1!}
    restart: 'no'

  migrate:
    build:
      context: .
      dockerfile: project/infra/docker/Dockerfile
      target: runtime
    command: ['node', 'project/src/dist/entrypoints/migrate.js']
    environment:
      <<: *cogeto-env
      # QS-9: migrate also publishes the PUBLIC half into the app-only volume.
      COGETO_INSTANCE_PUBKEY_DIR: /instance-pubkey
    # The only writer of the instance keypair: generated here once, then the
    # PRIVATE half mounted read-only into the worker and the PUBLIC half into the
    # app (§B.1, decision 0008; QS-9).
    volumes:
      - instance-keys:/instance-keys
      - instance-pubkey:/instance-pubkey
    depends_on:
      postgres:
        condition: service_healthy
      instance-keys-init:
        condition: service_completed_successfully
      preflight:
        condition: service_completed_successfully
    restart: 'no'

  # The runtime image runs as uid 1000 (node); fresh named volumes are
  # root-owned. Hand both key volumes over before migrate generates the keypair
  # (same pattern as machinekey-init below).
  instance-keys-init:
    # busybox:stable
    image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    command: ['chown', '-R', '1000:1000', '/instance-keys', '/instance-pubkey']
    volumes:
      - instance-keys:/instance-keys
      - instance-pubkey:/instance-pubkey
    restart: 'no'

  # Creates the bucket, turns on default SSE-S3 encryption, and ASSERTS the
  # bucket reports encryption enabled — a misencrypted instance fails compose up
  # instead of silently storing plaintext bytes (§A.9, audit 3.9, decision 0008).
  minio-init:
    # minio/mc:latest (pinned by digest — QS-25)
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    entrypoint: ['/bin/sh', '-c']
    command:
      - >-
        mc alias set local http://minio:9000
        "${MINIO_ROOT_USER:-cogeto}" "${MINIO_ROOT_PASSWORD:-cogeto-dev-password}" &&
        mc mb --ignore-existing local/cogeto &&
        mc encrypt set sse-s3 local/cogeto &&
        case "$$(mc encrypt info local/cogeto)" in *sse-s3*)
        echo "bucket cogeto ready (SSE-S3 default encryption verified)";; *)
        echo "FATAL: bucket encryption could not be enabled/verified" >&2; exit 1;;
        esac
    depends_on:
      minio:
        condition: service_healthy
    restart: 'no'

  # The zitadel image runs as uid 1000; the fresh named volume it writes its
  # bootstrap PAT into is root-owned. Hand it over before zitadel starts.
  machinekey-init:
    # busybox:stable (pinned by digest — QS-25)
    image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    command: ['chown', '-R', '1000:1000', '/machinekey']
    volumes:
      - zitadel-machinekey:/machinekey
    restart: 'no'

  zitadel-init:
    # node:22-alpine (pinned by digest — QS-25)
    image: node@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    command: ['node', '/init/init.mjs']
    environment:
      ZITADEL_INTERNAL_URL: http://zitadel:8080
      ZITADEL_EXTERNAL_DOMAIN: ${COGETO_EXTERNAL_DOMAIN:-localhost}
      COGETO_ISSUER: https://${COGETO_EXTERNAL_DOMAIN:-localhost}
      COGETO_REDIRECT_URI: https://${COGETO_EXTERNAL_DOMAIN:-localhost}/callback
      COGETO_POST_LOGOUT_URI: https://${COGETO_EXTERNAL_DOMAIN:-localhost}/
      ZITADEL_PAT_FILE: /machinekey/pat.txt
      COGETO_WEB_CONFIG_FILE: /web-config/config.json
      # QS-10: grant the FirstInstance admin the operator role so the System view
      # works out of the box (must match the app's COGETO_ADMIN_ROLE).
      ZITADEL_ADMIN_USERNAME: ${ZITADEL_ADMIN_USERNAME:-admin@cogeto.localhost}
      COGETO_ADMIN_ROLE: ${COGETO_ADMIN_ROLE:-admin}
    volumes:
      - ./project/infra/docker/zitadel-init:/init:ro
      - zitadel-machinekey:/machinekey:ro
      - web-config:/web-config
    depends_on:
      zitadel:
        condition: service_healthy
    restart: 'no'

  # ── Infrastructure ──────────────────────────────────────────────────────────
  # All infra images are PINNED BY DIGEST (QS-25); the tag is kept in a comment.
  postgres:
    # postgres:17-alpine
    image: postgres@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    environment:
      POSTGRES_DB: cogeto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cogeto-dev-password}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cogeto']
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  qdrant:
    # qdrant/qdrant:v1.14.0
    image: qdrant/qdrant@sha256:f21bbaf111837592b70f4d727c62cf6d6525b5374b1193e9faeac26a953702a8
    # API key auth (QS-4). Qdrant enables auth whenever QDRANT__SERVICE__API_KEY
    # is present — INCLUDING an empty value — so it is opt-in (compose cannot
    # conditionally omit an env var, and an empty key would lock out the internal
    # clients). To require a key: set COGETO_QDRANT_API_KEY (the app/worker
    # clients send it automatically) AND uncomment the line below with the same
    # value. MUST be enabled before the qdrant.localhost console is exposed.
    # environment:
    #   QDRANT__SERVICE__API_KEY: ${COGETO_QDRANT_API_KEY}
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  minio:
    # minio/minio:latest (pinned by digest — QS-25)
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    # Console on :9001 (S3 API stays on :9000). Fronted by the localhost-only
    # `caddy-consoles` service under the `consoles` profile (QS-4) — no host
    # ports published here (single-ingress; decision 0017).
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cogeto}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cogeto-dev-password}
      # The console's public origin behind the Caddy edge (decision 0017).
      # NOTE: we deliberately do NOT set MINIO_SERVER_URL — it would point the
      # console's API client at https://s3.localhost, which is unresolvable from
      # inside the container (that DNS is host-only) and breaks console login
      # with a 503. Presigned downloads do NOT need it: MinIO validates SigV4
      # against the incoming Host header (preserved by Caddy), which matches
      # COGETO_S3_PUBLIC_URL. TLS is terminated at Caddy; MinIO speaks HTTP.
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-https://minio.localhost}
      # Server-side encryption at rest (§A.9, decision 0008): single-node KMS
      # backed by one named static key. Format: <name>:<base64 32 bytes>.
      # The baked-in value is DEV-ONLY; provisioning generates a real one per
      # instance (see .env.example). Rotation via KES is a Later item (0008).
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY:-cogeto-dev-key:bxaADytwX4au7d/HYGegSGd0uloQlb30uz6Vh5opUvg=}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  zitadel:
    # ghcr.io/zitadel/zitadel:v2.65.1 (pinned by digest — QS-25)
    image: ghcr.io/zitadel/zitadel@sha256:013d23b69aa681f03d36a7fd61e4837a7b049a7e22bd7215eb3e98e9dbf5543c
    # QS-24: masterkey via env (--masterkeyFromEnv reads ZITADEL_MASTERKEY below),
    # not on the command line — it is no longer visible in `docker inspect` / `ps`.
    command: 'start-from-init --masterkeyFromEnv --tlsMode external'
    environment:
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD:-zitadel-dev-password}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:-cogeto-dev-password}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: ${COGETO_EXTERNAL_DOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: 'true'
      # TLS terminates at Caddy; this also keeps the `zitadel ready` probe on HTTP.
      ZITADEL_TLS_ENABLED: 'false'
      ZITADEL_FIRSTINSTANCE_ORG_NAME: ${ZITADEL_ORG_NAME:-Cogeto}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME:-admin@cogeto.localhost}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:-DevPassword1!}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: 'false'
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME: Cogeto
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: ${ZITADEL_ADMIN_USERNAME:-admin@cogeto.localhost}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: 'true'
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: cogeto-bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Cogeto Bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: '2030-01-01T00:00:00Z'
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/pat.txt
      # Instance-default branding: no "Powered by Zitadel" watermark on the login UI.
      ZITADEL_DEFAULTINSTANCE_LABELPOLICY_DISABLEWATERMARK: 'true'
    volumes:
      - zitadel-machinekey:/machinekey
    healthcheck:
      test: ['CMD', '/app/zitadel', 'ready']
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      machinekey-init:
        condition: service_completed_successfully
      preflight:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Infrastructure consoles edge (profile `consoles`; QS-4) ─────────────────
  # The MinIO console, Qdrant dashboard, and the S3 presign origin — served ONLY
  # here, bound to 127.0.0.1, so they never answer on the public 80/443 listener
  # by Host header. Bring up with `--profile consoles`; reach them at
  # https://s3.localhost:8443 / https://minio.localhost:8443 /
  # https://qdrant.localhost:8443 (add the *.localhost DNS entries, decision
  # 0017). O1 presigned downloads resolve here too, so downloads need this
  # profile up and COGETO_S3_PUBLIC_URL pointing at the :8443 origin.
  caddy-consoles:
    profiles: ['consoles']
    build:
      context: .
      dockerfile: project/infra/docker/Dockerfile
      target: caddy-consoles
    ports:
      - '127.0.0.1:8443:443'
      - '127.0.0.1:8480:80'
    volumes:
      - caddy-consoles-data:/data
      - caddy-consoles-config:/config
    depends_on:
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ── Dev-only tools (profile-gated; never started by default) ───────────────
  # Seeds one MinIO object + file_metadata + derived memory so the deletion
  # saga's object leg is demonstrable before file upload exists (Session F1).
  # Runs from the BUILD stage image — the runtime image excludes dev scripts.
  #   docker compose --profile dev-seed run --rm seed-object --owner <id> --org <id>
  seed-object:
    profiles: ['dev-seed']
    build:
      context: .
      dockerfile: project/infra/docker/Dockerfile
      target: build
    entrypoint: ['node', 'project/src/dist/entrypoints/seed-object.js']
    environment: *cogeto-env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: 'no'

  # Plants a stray Qdrant point a confirmed receipt promised gone — the sweep
  # drill (Session F1-B): run this, then the sweep, and watch System go red.
  #   docker compose --profile dev-seed run --rm seed-orphan
  seed-orphan:
    profiles: ['dev-seed']
    build:
      context: .
      dockerfile: project/infra/docker/Dockerfile
      target: build
    entrypoint: ['node', 'project/src/dist/entrypoints/seed-orphan.js']
    environment: *cogeto-env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: 'no'

  # ── Ana sandbox (profile demo; §B.9, decision 0022) ────────────────────────
  #
  # ⚠️  SECURITY WARNING (decision 0022 ruling 1). This profile turns the instance
  #     into the PUBLIC SANDBOX: the demo-seed job provisions a real Zitadel
  #     Principal and publishes its access token on the (public) /api/config, so
  #     any visitor is pre-authenticated. This is acceptable ONLY because the
  #     instance holds NO REAL DATA and is disposable. The demo profile must
  #     NEVER share infrastructure (Postgres / Qdrant / MinIO / Zitadel) with a
  #     customer instance — a leaked demo token must reach nothing but fictional
  #     data. A production instance (COGETO_PRODUCTION=1) refuses the demo seed.
  #
  #   COGETO_DEMO_MODE=1 docker compose --profile demo up --build
  #     seeds the sandbox, serves the demo session (QS-3: the flag is REQUIRED),
  #     and enables the worker's scheduled reset.
  #
  # Runs from the BUILD image (like seed-object) — it needs the demo corpus and
  # dev entrypoints the runtime image strips. Feeds the corpus through the REAL
  # public API (decision 0022; no direct DB inserts) and asserts the end state.
  demo-seed:
    profiles: ['demo']
    build:
      context: .
      dockerfile: project/infra/docker/Dockerfile
      target: build
    entrypoint: ['node', 'project/src/dist/entrypoints/demo-seed.js']
    environment:
      <<: *cogeto-env
      COGETO_DEMO_MODE: '1'
      COGETO_DEMO_APP_URL: http://app:3000
      COGETO_ZITADEL_PAT_FILE: /machinekey/pat.txt
    volumes:
      # Bootstrap PAT to provision the demo Principal; demo-config to publish its
      # session for the app + worker.
      - zitadel-machinekey:/machinekey:ro
      - demo-config:/demo-config
    depends_on:
      app:
        condition: service_healthy
      zitadel:
        condition: service_healthy
      zitadel-init:
        condition: service_completed_successfully
    restart: 'no'

  # ── Redaction sidecar (profile redaction; §B.8, decisions 0002/0023) ────────
  #
  # Local CPU NER (Presidio) that pseudonymizes sensitive entities before any
  # external model call and re-identifies the response — "PII never leaves your
  # box, even though a frontier model answers you." Python ONLY here, isolated
  # behind the model-gateway seam (decision 0002). Stateless: no DB, no volumes.
  # Internal-network only (no published ports); reachable at http://redaction:8080.
  #
  #   REDACTION_ENABLED=1 docker compose --profile redaction up --build
  #
  # The env flips the gateway on; the profile brings the sidecar up. If enabled
  # and the sidecar is unreachable, model calls FAIL CLOSED (never plaintext).
  # Memory: ~0.7–1 GB RSS (spaCy en_core_web_lg). See project/services/redaction.
  redaction:
    profiles: ['redaction']
    build:
      context: project/services/redaction
    environment:
      SPACY_MODEL: ${REDACTION_SPACY_MODEL:-en_core_web_lg}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s
    restart: unless-stopped

  # ── Inbound mail (Session O4, decision 0028; roadmap D2) ────────────────────
  #
  # Per-tenant, RECEIVE-ONLY Haraka SMTP. Accepts forwarded mail for this
  # instance's single inbound address, applies recipient/size/rate hygiene, and
  # POSTs the full raw message to the app's internal authenticated intake
  # (COGETO_MAIL_INTAKE_TOKEN must match the app). It NEVER sends. Listens on
  # 2525 as a non-root user; the standard inbound port 25 is mapped to it. The
  # allowlist (the real acceptance gate) lives in the app, not here.
  #
  # MX/TLS/DNS to point real mail at this container is an O6 provisioning
  # concern; see docs/notes/email-inbound.md. Locally, exercise it with
  # scripts/dev/send-test-email.mjs (no real DNS needed).
  mail:
    build:
      context: project/services/mail
    environment:
      COGETO_MAIL_INBOUND_ADDRESS: ${COGETO_MAIL_INBOUND_ADDRESS:-capture@in.localhost}
      COGETO_MAIL_MAX_BYTES: ${COGETO_MAIL_MAX_BYTES:-26214400}
      COGETO_INTAKE_URL: ${COGETO_INTAKE_URL:-http://app:3000/api/email/intake}
      COGETO_MAIL_INTAKE_TOKEN: ${COGETO_MAIL_INTAKE_TOKEN:-cogeto-dev-mail-token}
      # Inbound STARTTLS (GAP-2): the entrypoint enables STARTTLS only when a
      # readable cert/key is present at these paths. Dev leaves them unmounted →
      # STARTTLS is simply not advertised; a deployed instance populates them.
      COGETO_MAIL_TLS_CERT: ${COGETO_MAIL_TLS_CERT:-/app/tls/cert.pem}
      COGETO_MAIL_TLS_KEY: ${COGETO_MAIL_TLS_KEY:-/app/tls/key.pem}
    ports:
      # Host inbound port 25 → container 2525 (non-root listener). Change the
      # host side if 25 is taken locally, e.g. '2525:2525'.
      - '${COGETO_MAIL_HOST_PORT:-25}:2525'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('net').connect(2525,'127.0.0.1').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  qdrant-data:
  minio-data:
  instance-keys:
  # QS-9: the public-key-only volume the internet-facing app mounts (migrate
  # publishes the public half here; the private half never leaves instance-keys).
  instance-pubkey:
  zitadel-machinekey:
  web-config:
  caddy-data:
  caddy-config:
  caddy-consoles-data:
  caddy-consoles-config:
  # Ana sandbox demo Principal's session (decision 0022) — written by demo-seed,
  # read by app + worker. Empty (inert) on a non-demo instance.
  demo-config:
