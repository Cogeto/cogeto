<script>

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const seg=(p,a,b)=>clamp((p-a)/(b-a),0,1);
const easeOut=t=>1-Math.pow(1-t,3);
const easeInOut=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const easeOutBack=t=>{const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);};
const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const ring=document.querySelector('.ring'),
      point=document.querySelector('.point'),
      ltrs=[...document.querySelectorAll('.ltr')],
      tg=document.querySelector('.tg');
const T=6000;
function frame(p){
  const out=1-seg(p,0.90,0.98);
  ring.style.strokeDashoffset=(1-easeOut(seg(p,0.02,0.18)))*100;
  ring.style.opacity=Math.min(seg(p,0.02,0.06),1)*out;
  // point
  let s,op;
  if(p<0.13){s=0;op=0;}
  else if(p<0.22){s=easeOutBack(seg(p,0.13,0.22));op=seg(p,0.13,0.18);}
  else{ s=1+0.05*Math.sin((p-0.22)*2*Math.PI*1.8); op=1; }
  point.style.transform=`scale(${Math.max(s,0)})`;
  point.style.opacity=op*out;
  // letters staggered rise
  ltrs.forEach((el,i)=>{
    const st=0.20+i*0.045, l=easeOut(seg(p,st,st+0.13));
    el.style.opacity=l*out;
    el.style.transform=`translateY(${(1-l)*9}px)`;
  });
  // tagline
  tg.style.opacity=easeOut(seg(p,0.52,0.62))*out;
}
let t0=null;
function loop(now){ if(t0===null)t0=now; frame(((now-t0)%T)/T); requestAnimationFrame(loop); }
if(reduce){ frame(0.78); } else { requestAnimationFrame(loop); }
</script>
