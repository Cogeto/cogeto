# Dependabot configuration (PA-5). Version-update PRs on a weekly cadence for
# every ecosystem in the repo; GitHub-native Dependabot SECURITY updates are
# enabled separately in Settings → Code security (owner action). All PRs are
# labelled so they group correctly in the release notes (.github/release.yml)
# and land through the normal required-checks + squash-merge loop.
version: 2
updates:
  # GitHub Actions — keep the SHA-pinned actions (PA-6) current. Dependabot
  # bumps the pinned SHA and refreshes the trailing `# vX.Y.Z` comment.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
      - dependencies
    groups:
      actions:
        patterns:
          - '*'

  # npm workspace (root lockfile covers @cogeto/shared, @cogeto/server, web).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - chore
      - dependencies
    groups:
      # One PR for routine dev/test tooling; production deps stay individual so
      # each is reviewed against the module boundaries + eval gate on its own.
      # Minor+patch ONLY: majors arrive as individual PRs so one incompatible
      # major (e.g. a TypeScript bump ahead of typescript-eslint's peer range)
      # cannot poison the whole group (2026-07 triage, PR #109).
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # typescript-eslint's peer range caps the TypeScript major; take TS
      # majors deliberately once the toolchain supports them.
      - dependency-name: typescript
        update-types: ['version-update:semver-major']
      # Version-locked to the digest-pinned Qdrant server image (client
      # major.minor tracks the server - docs/operations/image-pins.md).
      # Upgraded manually in lockstep with the server, never alone.
      - dependency-name: '@qdrant/js-client-rest'

  # Receive-only Haraka mail service (its own package.json + lockfile — SEC-9).
  # It parses hostile internet input, so keep its tree current.
  - package-ecosystem: npm
    directory: /project/services/mail
    schedule:
      interval: weekly
    labels:
      - chore
      - dependencies

  # Python redaction sidecar (requirements.txt → hash-locked requirements.lock).
  - package-ecosystem: pip
    directory: /project/services/redaction
    schedule:
      interval: weekly
    labels:
      - chore
      - dependencies
