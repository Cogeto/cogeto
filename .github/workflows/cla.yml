# CLA signing — one PR comment, no forms (issue #70).
#
# On a contributor's FIRST pull request this workflow posts instructions and
# sets a pending "cla" status. The contributor signs by commenting the exact
# phrase CLA.md §2.1 recognizes as binding acceptance:
#
#     I have read the CLA Document and I hereby sign the CLA
#
# The signature (GitHub username + timestamp) is committed permanently to the
# `cla-signatures` branch (protected `main` cannot take direct pushes), and the
# status flips green. Returning contributors are never asked again. The check
# is ADVISORY — deliberately not in branch protection until the maintainer
# promotes it — the maintainer glances at it before merging.
#
# The email/signed-form acceptance path in CLA.md remains available (entities,
# or anyone preferring it). Comment `recheck` on a PR to re-run the check.
name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# SECURITY INVARIANT (PA-3): this workflow runs on `pull_request_target`, so it
# executes with the base repo's write token even for fork PRs. It MUST NOT check
# out or execute the PR head — no `actions/checkout` of the PR ref, no build/test
# of contributor code. It only invokes the CLA action against the PR metadata.
# Adding any checkout of `github.event.pull_request.head` here would turn this
# into a token-exfiltration (pwn-request) vector. Keep it checkout-free.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: cla
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/Cogeto/cogeto/blob/main/CLA.md'
          # Signatures live on their own branch: main is protected and takes
          # no direct pushes. The record stays in-repo, permanent, auditable.
          branch: 'cla-signatures'
          # The maintainer authors as the owner; bots hold no copyright.
          allowlist: 'igolubic,dependabot[bot],github-actions[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          lock-pullrequest-aftermerge: false
