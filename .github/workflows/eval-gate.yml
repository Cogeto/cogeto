# The §B.4 eval gate (decision 0011): prompt, model, or pipeline changes that
# regress the golden set fail the build. Runs on the paths that can move the
# measured numbers, and on every push to main. Thresholds live in
# project/eval/gates.json (versioned; ratchet UP only — lowering a gate
# requires a decision record).
#
# Owner setup (recorded in the F2-B session log):
#   1. Add the repository secret MISTRAL_API_KEY.
#   2. Mark the "eval-gate" check as required-to-merge in branch protection.
#
# Forks have no secrets: the job then SKIPS LOUDLY instead of failing —
# maintainers see the gate run on the merge branch, where the secret exists.

name: eval-gate

on:
  pull_request:
    paths:
      - 'project/prompts/**'
      - 'project/eval/**'
      - 'project/src/ingestion/**'
      - 'project/src/retrieval/**'
      - 'project/src/model-gateway/**'
      - 'project/shared/**'
  push:
    branches: [main]
    paths:
      - 'project/prompts/**'
      - 'project/eval/**'
      - 'project/src/ingestion/**'
      - 'project/src/retrieval/**'
      - 'project/src/model-gateway/**'
      - 'project/shared/**'

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check for the eval secret
        id: secret
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          if [ -z "$MISTRAL_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=eval gate SKIPPED::MISTRAL_API_KEY is not available (fork PR?). The golden-set gate did NOT run here — it will run on the merge branch, where the secret exists."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Golden-set gate (extraction + reconciliation, gates.json)
        if: steps.secret.outputs.present == 'true'
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          COGETO_EVAL_GATE: '1'
        run: npm run eval

      - name: Chat eval gate (all cases must PASS)
        if: steps.secret.outputs.present == 'true'
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          COGETO_EVAL_GATE: '1'
        run: npm run eval:chat
