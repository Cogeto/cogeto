# Sync the Docker Hub repository overviews from version-controlled markdown
# (docs/dockerhub/*.md) so the three published images show what they are, which
# tags to use, and how to verify their cosign signatures (PA-16).
#
# MANUAL DISPATCH ONLY, and DORMANT until the owner adds a DOCKERHUB_PASSWORD
# secret. Docker Hub's description API authenticates through /users/login, which
# needs the ACCOUNT PASSWORD, not the repo-scoped push access token used for
# image pushes (that returned "Forbidden"). So this is opt-in: add the password
# secret if you want the overviews kept in sync from the repo; otherwise the
# markdown files below are the source of truth and can be pasted by hand.
name: Docker Hub overview

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: sync overview
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - repo: cogeto/cogeto
            file: ./docs/dockerhub/cogeto.md
            short: 'Private, EU-hosted AI memory you can inspect, correct, and prove deleted. AGPLv3.'
          - repo: cogeto/cogeto-edge
            file: ./docs/dockerhub/cogeto-edge.md
            short: 'TLS edge (Caddy + prebuilt web app) for a Cogeto instance. AGPLv3.'
          - repo: cogeto/cogeto-mail
            file: ./docs/dockerhub/cogeto-mail.md
            short: 'Receive-only inbound SMTP (Haraka) for a Cogeto instance. AGPLv3.'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Update ${{ matrix.repo }} overview
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # Account password (NOT the push access token) — the description API
          # requires it. Add it as the DOCKERHUB_PASSWORD secret to enable this.
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ matrix.repo }}
          readme-filepath: ${{ matrix.file }}
          short-description: ${{ matrix.short }}
