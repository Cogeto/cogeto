# Release pipeline for Cogeto — tag-driven.
#
# Pushing a semver tag `vX.Y.Z` cuts a release:
#   1. verify:version — the tag must equal package.json's version (two sources
#      of truth, one number). A mismatch fails before anything is published.
#   2. Build the production amd64 images once each — the full pull-only set a
#      customer instance needs (decision 0030: the instance NEVER builds):
#        cogeto/cogeto        app/worker/migrate/preflight (target `runtime`)
#        cogeto/cogeto-edge   Caddy edge with the built SPA (target `caddy`)
#        cogeto/cogeto-mail   receive-only Haraka inbound SMTP (Session O4)
#   3. Push each as :X.Y.Z and :latest to Docker Hub.
#   4. Sign every pushed image with keyless cosign (Sigstore, GitHub OIDC — no
#      long-lived keys) and generate an SBOM for the main image, attached to
#      the GitHub Release.
#   5. Create the GitHub Release with notes auto-generated from the merged
#      Conventional-Commit pull requests (grouped by .github/release.yml), plus
#      a footer showing the exact `cosign verify` commands for these images.
#
# The owner cuts releases by tagging; CI never creates tags. Required secrets:
# DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (see docs/notes/cicd-setup.md).
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual re-publish of a version's trust scores WITHOUT re-tagging (the tag is
  # protected and images must not be rebuilt). Used when the tag-triggered
  # trust-scores job failed transiently (flaky live eval, a leftover branch): it
  # skips the image build and runs ONLY the idempotent trust-scores job for the
  # given version.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to (re)publish trust scores for, e.g. v1.0.0'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE: cogeto/cogeto
  IMAGE_EDGE: cogeto/cogeto-edge
  IMAGE_MAIL: cogeto/cogeto-mail

# Least privilege (PA-2): permissions are scoped PER JOB, not workflow-wide.
# Only the `release` job mints an OIDC id-token (keyless cosign); the
# `trust-scores` job never should, so it does not get id-token:write.
permissions:
  contents: read

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    # Only a real tag push builds/publishes images; a manual dispatch re-runs
    # ONLY the trust-scores job (below) and skips this one.
    if: github.event_name == 'push'
    permissions:
      contents: write # create the GitHub Release
      id-token: write # keyless cosign signing via Sigstore OIDC
      packages: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # full history so release-note generation sees prior tags

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      # ── Gate: tag must match package.json ────────────────────────────────
      - name: Verify tag matches package.json version
        run: npm run verify:version

      - name: Derive version numbers
        id: v
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Build & push the amd64 images once each ──────────────────────────
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push cogeto/cogeto (amd64)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: project/infra/docker/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.v.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Keep the pushed tags plain single-arch images so cosign signs and
          # verifies by the image digest unambiguously. Signing + SBOM are done
          # explicitly with cosign below.
          provenance: false
          sbom: false

      # The Caddy edge carries the built SPA — a pull-only instance cannot
      # produce it locally (decision 0030), so the release publishes it.
      - name: Build and push cogeto/cogeto-edge (amd64)
        id: build-edge
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: project/infra/docker/Dockerfile
          target: caddy
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_EDGE }}:${{ steps.v.outputs.version }}
            ${{ env.IMAGE_EDGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      # The receive-only Haraka inbound SMTP service (Session O4, decision 0028).
      - name: Build and push cogeto/cogeto-mail (amd64)
        id: build-mail
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: project/services/mail
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_MAIL }}:${{ steps.v.outputs.version }}
            ${{ env.IMAGE_MAIL }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      # ── Sign the pushed images (keyless, by digest) ──────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # PINNED to the cosign major the customer-side verifier uses: the
          # operator script installs cosign 2.4.1 (COSIGN_VERSION) and the docs
          # publish `cosign verify` commands for it. installer v4 defaults to
          # cosign 3.x, whose bundle format older verifiers cannot read - move
          # signer and verifier to 3.x together, never via a default drift.
          cosign-release: 'v2.4.1'

      - name: Sign the images with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          DIGEST_EDGE: ${{ steps.build-edge.outputs.digest }}
          DIGEST_MAIL: ${{ steps.build-mail.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
          cosign sign --yes "${IMAGE_EDGE}@${DIGEST_EDGE}"
          cosign sign --yes "${IMAGE_MAIL}@${DIGEST_MAIL}"

      # ── SBOM (SPDX JSON) for the pushed image ────────────────────────────
      - name: Generate SBOM (Syft, SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE }}:${{ steps.v.outputs.version }}
          format: spdx-json
          output-file: cogeto-${{ steps.v.outputs.version }}.sbom.spdx.json
          upload-artifact: false

      - name: Attach SBOM as a cosign attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          SBOM: cogeto-${{ steps.v.outputs.version }}.sbom.spdx.json
        run: |
          cosign attest --yes \
            --predicate "$SBOM" \
            --type spdxjson \
            "${IMAGE}@${DIGEST}"

      # ── GitHub Release with grouped, auto-generated notes ────────────────
      - name: Compose release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.v.outputs.tag }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          # Notes grouped by type per .github/release.yml (Features / Fixes /
          # Docs / Chores), computed from the merged Conventional-Commit PRs.
          BODY="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" --jq '.body')"
          {
            echo "Cogeto ${VERSION} — EU-hosted AI command center with verifiable memory."
            echo
            echo "$BODY"
            echo
            echo "---"
            echo "**Verify these images** (keyless cosign signatures):"
            echo
            echo '```sh'
            for IMG in "${IMAGE}" "${IMAGE_EDGE}" "${IMAGE_MAIL}"; do
              echo "cosign verify ${IMG}:${VERSION} \\"
              echo "  --certificate-identity-regexp '^https://github.com/${GITHUB_REPOSITORY}/\\.github/workflows/release\\.yml@refs/tags/' \\"
              echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'"
            done
            echo '```'
          } > release-notes.md

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.v.outputs.tag }}
          VERSION: ${{ steps.v.outputs.version }}
          SBOM: cogeto-${{ steps.v.outputs.version }}.sbom.spdx.json
        run: |
          gh release create "$TAG" \
            --title "$VERSION" \
            --notes-file release-notes.md \
            "$SBOM"

  # ── Trust scores (O7, decision 0032) — NEVER blocks the release ──────────
  # A separate job so (a) job-level continue-on-error keeps the release run
  # green even when this fails, and (b) it can share the `live-model-eval`
  # concurrency group with CI's eval-gate: both consume ONE Mistral API key,
  # and running them concurrently (tag pushed right after the merge) made
  # them 429-rate-limit each other on v0.9.2. The eval commands also retry
  # once after a cool-off for any remaining transient rate limit.
  # Lands eval/trust-scores/vX.Y.Z.json + index.json on protected main via an
  # auto-merged PR (no protection bypass; the PR runs the full checks). The
  # redacted configuration is maintainer-run — docs/trust-scores-schema/.
  trust-scores:
    name: trust-scores
    needs: release
    # Run after a successful image release (tag push) OR on a manual dispatch
    # (where the release job above is skipped). `always()` lets it run despite
    # the skipped dependency.
    if: always() && (needs.release.result == 'success' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    continue-on-error: true
    # Minimal scope (PA-2): open + auto-merge the trust-scores PR. NO id-token.
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: live-model-eval
      cancel-in-progress: false
    env:
      # The version to publish: the manual input on dispatch, else the pushed tag.
      TARGET_VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Manual dispatch runs from main (the fixed workflow + current corpus);
          # full history so the publish step can diff against origin/main.
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      # Idempotency: if this version's scores are already on main (a prior run
      # succeeded), there is nothing to do — skip the expensive eval + publish.
      - name: Skip if already published
        id: guard
        run: |
          git fetch origin main --quiet
          if git cat-file -e "origin/main:eval/trust-scores/${TARGET_VERSION}.json" 2>/dev/null; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "trust scores for ${TARGET_VERSION} already on main — nothing to do."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Emit trust scores (measure-only — NOT gated)
        if: steps.guard.outputs.already == 'false'
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          # DELIBERATELY no COGETO_EVAL_GATE here. The trust scores are the
          # MEASURED metrics for the released code, and are published as-is
          # (honest numbers, incl. any run-to-run coverage-grader variance) — a
          # single flaky chat case must NOT block publishing them. The STRICT
          # gate still runs where it belongs: CI's eval-gate on every PR + push
          # to main (COGETO_EVAL_GATE=1), which is what actually guards merges.
          # So by the time a tag is cut, main has already passed the gate.
        run: |
          npm ci
          # eval / eval:chat exit non-zero ONLY on a real ERROR (transient rate
          # limit, network, schema) — a failed chat case just lowers the measured
          # number now that the gate env is unset. Retry rides out transient
          # errors; a flaky grader dip is published honestly, not retried away.
          attempt=1
          max=3
          until npm run eval -- --emit-json /tmp/trust-partial.json && \
                npm run eval:chat -- --emit-json /tmp/trust-partial.json; do
            if [ "$attempt" -ge "$max" ]; then
              echo "::error title=Trust scores NOT published for ${TARGET_VERSION}::A transient error persisted. Re-run: Actions → Release → Run workflow → version=${TARGET_VERSION} (idempotent)."
              exit 1
            fi
            echo "live eval hit a transient error (attempt ${attempt}/${max}) — cooling off 180s and retrying"
            attempt=$((attempt + 1))
            rm -f /tmp/trust-partial.json
            sleep 180
          done

      - name: Publish via auto-merged PR
        if: steps.guard.outputs.already == 'false'
        env:
          # Token preference for opening + landing the trust-scores PR:
          #   1. TRUSTSCORES_TOKEN — a dedicated, repo-scoped admin PAT (owner
          #      action). This workflow is triggered ONLY by a tag push or a
          #      manual dispatch — never by Dependabot or a fork PR — so an
          #      admin token here lets the trust-scores PR self-merge WITHOUT
          #      letting anyone else bypass `main`'s review rule (their PRs still
          #      require review). It merges only AFTER the required checks pass.
          #   2. PROJECTS_TOKEN — a non-admin PAT: the PR is created and its
          #      checks run, but the final merge needs a maintainer's one-click
          #      approve (a bot cannot approve its own PR).
          #   3. github.token — fallback; the PR is created but its checks may
          #      need a manual nudge.
          GH_TOKEN: ${{ secrets.TRUSTSCORES_TOKEN != '' && secrets.TRUSTSCORES_TOKEN || (secrets.PROJECTS_TOKEN != '' && secrets.PROJECTS_TOKEN || github.token) }}
          HAS_ADMIN_TOKEN: ${{ secrets.TRUSTSCORES_TOKEN != '' }}
        run: |
          set -euo pipefail
          TAG="${TARGET_VERSION}"
          # Generate onto a clean main so the rebuilt index reflects the latest
          # published set (the publish script refuses to overwrite a release file).
          git checkout -B publish-base origin/main
          node scripts/ci/publish-trust-scores.mjs \
            --version "$TAG" --sha "$GITHUB_SHA" \
            --partial /tmp/trust-partial.json \
            --out-dir eval/trust-scores
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # A FRESH, unique branch per run. Reusing one branch and force-pushing
          # fires a `synchronize` event that a PAT push does NOT trigger checks
          # for, so `gh pr checks` reported "no checks" and the PR never merged
          # (stranded v1.0.1/v1.0.2). A fresh branch → a `pull_request: opened`
          # → the required checks reliably run. The idempotency guard above stops
          # duplicate publishes; close any older open PR for this version first so
          # re-runs do not pile up.
          for old in $(gh pr list --state open --search "chore: publish trust scores for $TAG in:title" --json number --jq '.[].number'); do
            gh pr close "$old" --delete-branch --comment "Superseded by a fresh publish run." || true
          done
          BRANCH="trust-scores/${TAG}-${GITHUB_RUN_ID}"
          git checkout -B "$BRANCH"
          git add eval/trust-scores
          git commit -m "chore: publish trust scores for $TAG"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: publish trust scores for $TAG" \
            --label chore \
            --body "Automated (decision 0032): the measured trust scores for $TAG (eval/trust-scores/$TAG.json, immutable) and the rebuilt index. Merges automatically once the required checks pass."
          if [ "$HAS_ADMIN_TOKEN" = "true" ]; then
            # `gh pr checks --watch` errors "no checks reported" until the checks
            # register (they lag PR creation by a few seconds), so RETRY it until
            # they appear; once they do, it blocks until they conclude. Then
            # admin-merge — bypassing ONLY main's review rule, never the checks,
            # and only for this trust-scores PR.
            merged=false
            for attempt in $(seq 1 12); do
              set +e
              gh pr checks "$BRANCH" --watch --required --interval 30 > /tmp/checks.log 2>&1
              rc=$?
              set -e
              cat /tmp/checks.log
              if [ "$rc" -eq 0 ]; then
                gh pr merge "$BRANCH" --squash --admin --delete-branch
                merged=true
                break
              fi
              if grep -qi 'no checks' /tmp/checks.log; then
                echo "checks not registered yet (attempt ${attempt}/12) — waiting 20s"
                sleep 20
                continue
              fi
              echo "a required check failed — not merging"
              break
            done
            if [ "$merged" != "true" ]; then
              echo "::warning title=Trust-scores not auto-merged::Left the PR open for review."
              gh pr merge "$BRANCH" --squash --auto || true
            fi
          else
            # No admin token: arm auto-merge; a maintainer approves the green PR.
            gh pr merge "$BRANCH" --squash --auto
          fi
