# Cogeto customer-instance stack — PULL-ONLY (decision 0030; roadmap D3).
#
# This is the compose file the operator script (scripts/operator/cogeto)
# installs at /srv/cogeto on a customer instance. It differs from the repo-root
# docker-compose.yml (the dev contract, §A.2) in exactly these ways:
#
#   • NO `build:` keys anywhere — the instance pulls the prebuilt, cosign-signed
#     release images and never builds:
#       cogeto/cogeto:${COGETO_VERSION}        app / worker / migrate / preflight
#       cogeto/cogeto-edge:${COGETO_VERSION}   Caddy edge with the built SPA
#       cogeto/cogeto-mail:${COGETO_VERSION}   receive-only Haraka inbound SMTP
#   • Secrets are REQUIRED (`${VAR:?...}`) — a missing .env fails loudly instead
#     of falling back to a DEV default (preflight, QS-8, is the backstop).
#   • COGETO_PRODUCTION=1 is hardcoded — the demo seed/reset hard-refuse.
#   • The demo / dev-seed / consoles / redaction profiles are absent: the first
#     three are dev-only (their images are never published), and redaction is
#     not part of the v1 deploy channel (decision 0030). The ONE optional
#     profile here is `research` (decision 0055): SearXNG is a digest-pinned
#     upstream image, so it deploys pull-only like everything else. Enable it
#     with `cogeto features enable research` (it maintains COMPOSE_PROFILES in
#     .env and mirrors it into COGETO_COMPOSE_PROFILES for the app).
#   • Qdrant API-key auth is always on (QS-4).
#   • The edge terminates TLS with a real Let's Encrypt certificate: the
#     production Caddyfile (./Caddyfile) is mounted over the baked-in dev one.
#
# Infra images stay PINNED BY DIGEST (QS-25), same digests as the dev stack;
# the human-readable tag is kept in a comment (docs/operations/image-pins.md).

name: cogeto

services:
  # ── Edge (TLS via Let's Encrypt, HTTP→HTTPS redirect handled by Caddy) ──────
  caddy:
    image: cogeto/cogeto-edge:${COGETO_VERSION:?write COGETO_VERSION into .env (the operator script does this)}
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      COGETO_EXTERNAL_DOMAIN: ${COGETO_EXTERNAL_DOMAIN:?}
      COGETO_ACME_EMAIL: ${COGETO_ACME_EMAIL:?}
    volumes:
      # The production vhost (real domain + ACME) replaces the baked-in dev
      # Caddyfile (localhost + local_certs).
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:2019/config/']
      interval: 5s
      timeout: 3s
      retries: 12
    depends_on:
      app:
        condition: service_healthy
      zitadel:
        condition: service_healthy
    restart: unless-stopped

  # ── Application processes (same image, different commands) ─────────────────
  app:
    image: cogeto/cogeto:${COGETO_VERSION:?}
    command: ['node', 'project/src/dist/entrypoints/app.js']
    environment: &cogeto-env
      COGETO_HTTP_PORT: 3000
      COGETO_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?}@postgres:5432/cogeto
      COGETO_QDRANT_URL: http://qdrant:6333
      COGETO_QDRANT_API_KEY: ${COGETO_QDRANT_API_KEY:?}
      COGETO_S3_URL: http://minio:9000
      # Browser-reachable S3 origin for presigned download URLs (§A.9): the
      # s3.<domain> vhost on the edge, proxied to MinIO with the Host header
      # preserved so the SigV4 check matches.
      COGETO_S3_PUBLIC_URL: ${COGETO_S3_PUBLIC_URL:-https://s3.${COGETO_EXTERNAL_DOMAIN}}
      COGETO_S3_ACCESS_KEY: ${MINIO_ROOT_USER:?}
      COGETO_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?}
      COGETO_S3_BUCKET: cogeto
      # Instance signing keypair (deletion receipts, §B.1) — generated by the
      # migrate init job on first boot INSIDE the instance-keys volume. QS-9:
      # the internet-facing app mounts ONLY the public half.
      COGETO_INSTANCE_KEY_DIR: /instance-keys
      COGETO_ASSERT_NO_PRIVATE_KEY: '1'
      COGETO_OIDC_ISSUER: https://${COGETO_EXTERNAL_DOMAIN:?}
      COGETO_OIDC_INTERNAL_URL: http://zitadel:8080
      COGETO_OIDC_EXTERNAL_DOMAIN: ${COGETO_EXTERNAL_DOMAIN}
      COGETO_WEB_CONFIG_FILE: /web-config/config.json
      COGETO_MISTRAL_API_KEY: ${COGETO_MISTRAL_API_KEY:-}
      COGETO_MISTRAL_MODEL_PIPELINE: ${COGETO_MISTRAL_MODEL_PIPELINE:-}
      COGETO_MISTRAL_MODEL_ANSWER: ${COGETO_MISTRAL_MODEL_ANSWER:-}
      COGETO_MISTRAL_EMBED_MODEL: ${COGETO_MISTRAL_EMBED_MODEL:-}
      # Bring-your-own-key providers (decision 0040) — validated at boot.
      COGETO_PROVIDER_PRESET: ${COGETO_PROVIDER_PRESET:-}
      COGETO_PROVIDER_PIPELINE: ${COGETO_PROVIDER_PIPELINE:-}
      COGETO_MODEL_PIPELINE: ${COGETO_MODEL_PIPELINE:-}
      COGETO_PROVIDER_ANSWER: ${COGETO_PROVIDER_ANSWER:-}
      COGETO_MODEL_ANSWER: ${COGETO_MODEL_ANSWER:-}
      COGETO_PROVIDER_EMBEDDINGS: ${COGETO_PROVIDER_EMBEDDINGS:-}
      COGETO_MODEL_EMBEDDINGS: ${COGETO_MODEL_EMBEDDINGS:-}
      COGETO_OPENAI_API_KEY: ${COGETO_OPENAI_API_KEY:-}
      COGETO_OPENAI_BASE_URL: ${COGETO_OPENAI_BASE_URL:-}
      COGETO_ANTHROPIC_API_KEY: ${COGETO_ANTHROPIC_API_KEY:-}
      COGETO_ANTHROPIC_BASE_URL: ${COGETO_ANTHROPIC_BASE_URL:-}
      COGETO_LOG_LEVEL: ${COGETO_LOG_LEVEL:-info}
      # A customer instance is NEVER a sandbox (decision 0022): the demo
      # seed/reset hard-refuse when this is set.
      COGETO_PRODUCTION: '1'
      # Instance timezone (QS-32) — relative dates resolve against this zone.
      COGETO_TIMEZONE: ${COGETO_TIMEZONE:-Europe/Zagreb}
      # Inbound email (Session O4, decision 0028; sender routing per decision
      # 0031): the instance's unique inbound address, size caps, and the shared
      # secret the Haraka queue hook presents to the internal intake
      # (fail-closed).
      COGETO_MAIL_INBOUND_ADDRESS: ${COGETO_MAIL_INBOUND_ADDRESS:?}
      COGETO_MAIL_MAX_BYTES: ${COGETO_MAIL_MAX_BYTES:-26214400}
      COGETO_MAIL_ATTACHMENTS_MAX_BYTES: ${COGETO_MAIL_ATTACHMENTS_MAX_BYTES:-26214400}
      COGETO_MAIL_INTAKE_TOKEN: ${COGETO_MAIL_INTAKE_TOKEN:?}
      # The bootstrap admin's login email — the operator account is excluded
      # from sender-routed email capture (decision 0031).
      COGETO_ADMIN_USER_EMAIL: ${ZITADEL_ADMIN_USERNAME:?}
      COGETO_MAIL_SMTP_ADDRESS: ${COGETO_MAIL_SMTP_ADDRESS:-mail:2525}
      # Web research (Priority 5, decisions 0042/0043): discovery via the
      # profile-gated SearXNG service below; with the profile down, research
      # answers a typed "search unavailable", nothing crashes.
      COGETO_SEARXNG_URL: ${COGETO_SEARXNG_URL:-http://searxng:8080}
      COGETO_RESEARCH_RESULT_CAP: ${COGETO_RESEARCH_RESULT_CAP:-8}
      COGETO_RESEARCH_SEARCH_TIMEOUT_SECONDS: ${COGETO_RESEARCH_SEARCH_TIMEOUT_SECONDS:-10}
      COGETO_RESEARCH_FETCH_TIMEOUT_SECONDS: ${COGETO_RESEARCH_FETCH_TIMEOUT_SECONDS:-15}
      COGETO_RESEARCH_FETCH_MAX_BYTES: ${COGETO_RESEARCH_FETCH_MAX_BYTES:-5242880}
      COGETO_RESEARCH_PAGES_PER_RUN: ${COGETO_RESEARCH_PAGES_PER_RUN:-5}
      COGETO_RESEARCH_RETAIN_HTML: ${COGETO_RESEARCH_RETAIN_HTML:-}
      COGETO_DAILY_RESEARCH_SEARCHES: ${COGETO_DAILY_RESEARCH_SEARCHES:-40}
      COGETO_DAILY_RESEARCH_PAGES: ${COGETO_DAILY_RESEARCH_PAGES:-100}
      # Ollama local runtime (decision 0041) — set by `cogeto features enable
      # local-models`; unset on the default hosted configuration.
      COGETO_OLLAMA_BASE_URL: ${COGETO_OLLAMA_BASE_URL:-}
      COGETO_OLLAMA_API_KEY: ${COGETO_OLLAMA_API_KEY:-}
      COGETO_OLLAMA_TIMEOUT_PIPELINE_MS: ${COGETO_OLLAMA_TIMEOUT_PIPELINE_MS:-}
      COGETO_OLLAMA_TIMEOUT_ANSWER_MS: ${COGETO_OLLAMA_TIMEOUT_ANSWER_MS:-}
      COGETO_OLLAMA_TIMEOUT_EMBEDDINGS_MS: ${COGETO_OLLAMA_TIMEOUT_EMBEDDINGS_MS:-}
      # Capability visibility (P6.7, decision 0055): the active profile list,
      # mirrored from COMPOSE_PROFILES in .env (maintained by the operator
      # script's `features` command), plus the jobs' overdue threshold.
      COGETO_COMPOSE_PROFILES: ${COMPOSE_PROFILES:-}
      COGETO_JOBS_OVERDUE_HOURS: ${COGETO_JOBS_OVERDUE_HOURS:-}
    volumes:
      - web-config:/web-config:ro
      # QS-9: the app mounts the PUBLIC-KEY-ONLY volume — an RCE in the
      # internet-facing app cannot exfiltrate the receipt-signing private key.
      - instance-pubkey:/instance-keys:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      zitadel:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      zitadel-init:
        condition: service_completed_successfully
      preflight:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    image: cogeto/cogeto:${COGETO_VERSION:?}
    command: ['node', 'project/src/dist/entrypoints/worker.js']
    environment:
      <<: *cogeto-env
      # QS-39: graphile crons run in UTC so the nightly schedule is
      # timezone-stable across DST transitions.
      TZ: UTC
    volumes:
      # The worker keeps the FULL keypair (it signs receipts) — QS-9.
      - instance-keys:/instance-keys:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const s=require('fs').statSync('/tmp/worker-heartbeat');process.exit(Date.now()-s.mtimeMs<30000?0:1)"
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      preflight:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── One-shot init jobs ──────────────────────────────────────────────────────
  # Refuses to boot if a known DEV secret guards a non-localhost deployment
  # (QS-8). The only process handed every secret, so it enforces the rule
  # instance-wide.
  preflight:
    image: cogeto/cogeto:${COGETO_VERSION:?}
    command: ['node', 'project/src/dist/entrypoints/preflight.js']
    environment:
      COGETO_EXTERNAL_DOMAIN: ${COGETO_EXTERNAL_DOMAIN:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?}
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY:?}
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:?}
      ZITADEL_DB_PASSWORD: ${ZITADEL_DB_PASSWORD:?}
      ZITADEL_ADMIN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:?}
    restart: 'no'

  migrate:
    image: cogeto/cogeto:${COGETO_VERSION:?}
    command: ['node', 'project/src/dist/entrypoints/migrate.js']
    environment:
      <<: *cogeto-env
      # QS-9: migrate also publishes the PUBLIC half into the app-only volume.
      COGETO_INSTANCE_PUBKEY_DIR: /instance-pubkey
    # The only writer of the instance keypair: generated here once, then the
    # PRIVATE half mounted read-only into the worker and the PUBLIC half into
    # the app (§B.1, decision 0008; QS-9).
    volumes:
      - instance-keys:/instance-keys
      - instance-pubkey:/instance-pubkey
    depends_on:
      postgres:
        condition: service_healthy
      instance-keys-init:
        condition: service_completed_successfully
      preflight:
        condition: service_completed_successfully
    restart: 'no'

  # The runtime image runs as uid 1000 (node); fresh named volumes are
  # root-owned. Hand both key volumes over before migrate generates the keypair.
  instance-keys-init:
    # busybox:stable
    image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    command: ['chown', '-R', '1000:1000', '/instance-keys', '/instance-pubkey']
    volumes:
      - instance-keys:/instance-keys
      - instance-pubkey:/instance-pubkey
    restart: 'no'

  # Creates the bucket, turns on default SSE-S3 encryption, and ASSERTS the
  # bucket reports encryption enabled (§A.9, decision 0008).
  minio-init:
    # minio/mc:latest (pinned by digest — QS-25)
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    entrypoint: ['/bin/sh', '-c']
    command:
      - >-
        mc alias set local http://minio:9000
        "${MINIO_ROOT_USER:?}" "${MINIO_ROOT_PASSWORD:?}" &&
        mc mb --ignore-existing local/cogeto &&
        mc encrypt set sse-s3 local/cogeto &&
        case "$$(mc encrypt info local/cogeto)" in *sse-s3*)
        echo "bucket cogeto ready (SSE-S3 default encryption verified)";; *)
        echo "FATAL: bucket encryption could not be enabled/verified" >&2; exit 1;;
        esac
    depends_on:
      minio:
        condition: service_healthy
    restart: 'no'

  # The zitadel image runs as uid 1000; hand its bootstrap-PAT volume over.
  machinekey-init:
    # busybox:stable (pinned by digest — QS-25)
    image: busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    command: ['chown', '-R', '1000:1000', '/machinekey']
    volumes:
      - zitadel-machinekey:/machinekey
    restart: 'no'

  zitadel-init:
    # node:22-alpine (pinned by digest — QS-25)
    image: node@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    command: ['node', '/init/init.mjs']
    environment:
      ZITADEL_INTERNAL_URL: http://zitadel:8080
      ZITADEL_EXTERNAL_DOMAIN: ${COGETO_EXTERNAL_DOMAIN:?}
      COGETO_ISSUER: https://${COGETO_EXTERNAL_DOMAIN}
      COGETO_REDIRECT_URI: https://${COGETO_EXTERNAL_DOMAIN}/callback
      COGETO_POST_LOGOUT_URI: https://${COGETO_EXTERNAL_DOMAIN}/
      ZITADEL_PAT_FILE: /machinekey/pat.txt
      COGETO_WEB_CONFIG_FILE: /web-config/config.json
      # QS-10: grant the FirstInstance admin the operator role so the System
      # view works out of the box (must match the app's COGETO_ADMIN_ROLE).
      ZITADEL_ADMIN_USERNAME: ${ZITADEL_ADMIN_USERNAME:?}
      COGETO_ADMIN_ROLE: ${COGETO_ADMIN_ROLE:-admin}
    volumes:
      # init.mjs is part of the fetched deploy assets (same file as
      # project/infra/docker/zitadel-init/init.mjs, at the same version).
      - ./zitadel-init:/init:ro
      - zitadel-machinekey:/machinekey:ro
      - web-config:/web-config
    depends_on:
      zitadel:
        condition: service_healthy
    restart: 'no'

  # ── Infrastructure ──────────────────────────────────────────────────────────
  # All infra images are PINNED BY DIGEST (QS-25); the tag is kept in a comment.
  postgres:
    # postgres:17-alpine
    image: postgres@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    environment:
      POSTGRES_DB: cogeto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cogeto']
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  qdrant:
    # qdrant/qdrant:v1.18.3
    image: qdrant/qdrant@sha256:0bd98fa7977f1e75694779359ca4e212822e5a71334e28421182f72f209d5286
    # API-key auth is ALWAYS ON in the deploy stack (QS-4) — the app/worker
    # clients send COGETO_QDRANT_API_KEY automatically.
    environment:
      QDRANT__SERVICE__API_KEY: ${COGETO_QDRANT_API_KEY:?}
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  minio:
    # minio/minio:latest (pinned by digest — QS-25)
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    # No console vhost is exposed on a customer instance (the consoles profile
    # is dev-only); the console listener stays internal.
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?}
      # Server-side encryption at rest (§A.9, decision 0008): single-node KMS
      # backed by one named static key, generated per instance by the operator
      # script. Losing it makes stored objects unreadable — it is in the
      # instance secrets the operator must vault.
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY:?}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  zitadel:
    # ghcr.io/zitadel/zitadel:v2.65.1 (pinned by digest — QS-25)
    image: ghcr.io/zitadel/zitadel@sha256:013d23b69aa681f03d36a7fd61e4837a7b049a7e22bd7215eb3e98e9dbf5543c
    # QS-24: masterkey via env, never on the command line.
    command: 'start-from-init --masterkeyFromEnv --tlsMode external'
    environment:
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:?}
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD:?}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:?}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: ${COGETO_EXTERNAL_DOMAIN:?}
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: 'true'
      # TLS terminates at the edge; this also keeps the ready probe on HTTP.
      ZITADEL_TLS_ENABLED: 'false'
      ZITADEL_FIRSTINSTANCE_ORG_NAME: ${ZITADEL_ORG_NAME:-Cogeto}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME:?}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:?}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: 'false'
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME: Cogeto
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: ${ZITADEL_ADMIN_USERNAME}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: 'true'
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: cogeto-bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Cogeto Bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: '2030-01-01T00:00:00Z'
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/pat.txt
      ZITADEL_DEFAULTINSTANCE_LABELPOLICY_DISABLEWATERMARK: 'true'
    volumes:
      - zitadel-machinekey:/machinekey
    healthcheck:
      test: ['CMD', '/app/zitadel', 'ready']
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      machinekey-init:
        condition: service_completed_successfully
      preflight:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Web discovery (profile research; decisions 0042/0055) ───────────────────
  # Self-hosted SearXNG, the one optional profile in the deploy channel: a
  # digest-pinned upstream image (same digest as the dev stack — QS-25), so it
  # stays pull-only. Internal-network only (no published ports; the edge never
  # proxies it); reachable at http://searxng:8080. Enable/disable with
  # `cogeto features enable research` — it maintains COMPOSE_PROFILES in .env
  # and fetches ./searxng/settings.yml with the other deploy assets.
  searxng:
    profiles: ['research']
    image: searxng/searxng@sha256:b8ca38ba06eea544d7555e88321e212ddc0d5c3c7de055419cfb2e5c6bf30812
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      # NOT the `${VAR:?}` form: compose interpolates the whole file before
      # profile filtering, so a required var here would break `compose up` even
      # with research off. `cogeto features enable research` generates it.
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --spider
        - http://127.0.0.1:8080/healthz
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ── Inbound mail (Session O4, decision 0028; roadmap D2) ────────────────────
  # Per-tenant, RECEIVE-ONLY Haraka SMTP. The allowlist (the real acceptance
  # gate) lives in the app; DNS/MX wiring is printed by the operator script's
  # checklist (docs/notes/email-inbound.md).
  mail:
    image: cogeto/cogeto-mail:${COGETO_VERSION:?}
    environment:
      COGETO_MAIL_INBOUND_ADDRESS: ${COGETO_MAIL_INBOUND_ADDRESS:?}
      COGETO_MAIL_MAX_BYTES: ${COGETO_MAIL_MAX_BYTES:-26214400}
      COGETO_INTAKE_URL: http://app:3000/api/email/intake
      COGETO_MAIL_INTAKE_TOKEN: ${COGETO_MAIL_INTAKE_TOKEN:?}
      # Inbound STARTTLS (GAP-2): the entrypoint enables STARTTLS only when a
      # readable cert/key is present at these paths in the mail-tls volume. The
      # OPERATOR populates that volume with the instance's cert (OWNER ACTION —
      # the operator runbook documents copying the Caddy-obtained cert for the
      # mail hostname there; a dedicated volume, NOT the whole caddy-data store,
      # so the internet-facing mail container never holds Caddy's other keys).
      COGETO_MAIL_TLS_CERT: ${COGETO_MAIL_TLS_CERT:-/app/tls/cert.pem}
      COGETO_MAIL_TLS_KEY: ${COGETO_MAIL_TLS_KEY:-/app/tls/key.pem}
    volumes:
      - mail-tls:/app/tls:ro
    ports:
      # Standard inbound SMTP → the container's non-root listener.
      - '${COGETO_MAIL_HOST_PORT:-25}:2525'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('net').connect(2525,'127.0.0.1').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  qdrant-data:
  minio-data:
  # The receipt-signing keypair lives ONLY here (generated on first boot by
  # migrate) — it is covered by OVHcloud volume backups, never by files on disk.
  instance-keys:
  instance-pubkey:
  zitadel-machinekey:
  web-config:
  caddy-data:
  caddy-config:
  # Instance TLS cert/key for inbound STARTTLS (GAP-2). The operator populates it
  # with the mail hostname's certificate (operator runbook); empty → no STARTTLS.
  mail-tls:
