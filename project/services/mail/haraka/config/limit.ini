; Anti-abuse hygiene for an internet-facing receive-only server (decision 0028
; ruling 6). Sane defaults; tune per deployment. These are hygiene, NOT an
; anti-spam stack — the sender allowlist is the real acceptance gate.

[concurrency]
; Max simultaneous connections from one remote host.
default=3

[rate_conn]
; Max new connections per remote host per window.
default=30/60s

[rate_rcpt_host]
; Max recipients per remote host per window.
default=30/60s
