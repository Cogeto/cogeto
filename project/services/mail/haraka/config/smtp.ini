; Cogeto inbound Haraka core config (receive-only, decision 0028).
; Listens on 2525 inside the container as a NON-ROOT user; the deployment maps
; the standard inbound port 25 → 2525 (see docker-compose + the operator DNS/MX
; notes). TLS for inbound is terminated per the deployment (STARTTLS with the
; instance cert) — an O6 provisioning concern; see docs/notes/email-inbound.md.

[main]
listen=[::0]:2525
; One worker process is ample for a single-tenant inbound volume.
nodes=1
; Advertise + enforce the SMTP SIZE extension from config/databytes (written by
; the entrypoint from COGETO_MAIL_MAX_BYTES) so oversize mail is refused early.

[headers]
; Basic header hygiene only; no content spam scoring (the allowlist is the gate).
max_lines=1000

[outbound]
; Receive-only: disable outbound delivery entirely (ruling 4). Nothing in this
; deployment ever calls queue_outbound; this is belt-and-suspenders.
disabled=true
