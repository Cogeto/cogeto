; Connection defaults for the Cogeto inbound server. When Haraka runs with an
; explicit config dir (-c) it does NOT fall back to its packaged defaults, so
; every section its core dereferences must be present here. Based on Haraka's
; default connection.ini; only smtputf8 is turned on (international
; addresses/subjects for the EU audience) and the size cap matches our env.

[main]
; Advertise support for SMTPUTF8 (RFC-6531).
smtputf8=true

[haproxy]
; We run no HAProxy in front of the container (the deployment maps 25 -> 2525).
hosts[] =

[headers]
max_lines=1000
max_received=100

[max]
; The maximum message SIZE (bytes); the entrypoint also writes config/databytes
; from COGETO_MAIL_MAX_BYTES, which is the authoritative SMTP SIZE limit.
bytes=26214400
mime_parts=1000
line_length=512
data_line_length=992

[message]
helo=Cogeto inbound at your service.
close=closing connection. Have a jolly good day.

[uuid]
banner_chars=6
deny_chars=0
