    <link rel="icon" type="image/svg+xml" href="/brand/cogeto-final-favicon.svg" />
    <link rel="apple-touch-icon" href="/brand/cogeto-final-icon-tile.svg" />

    <!--
      Theme bootstrap (P6.8). An EXTERNAL same-origin file, not an inline script,
      so it runs under the SPA's strict CSP (script-src 'self', no 'unsafe-inline').
      A classic, render-blocking <script src> in <head> runs before the deferred
      module bundle, so the theme is set before first paint (no flash). Logic and
      precedence live in /theme-init.js, mirroring src/theme.ts.
    -->
    <script src="/theme-init.js"></script>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
