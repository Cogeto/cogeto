<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/cogeto-final-favicon.svg" />
    <link rel="apple-touch-icon" href="/brand/cogeto-final-icon-tile.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c2150" />
    <meta
      name="description"
      content="Cogeto: a private, EU-hosted AI command center with verifiable memory, where every trust claim is backed by an inspectable artifact."
    />
    <title>Cogeto: verifiable memory</title>
    <!--
      Theme bootstrap (P6.8). Runs before first paint so there is no flash of the
      wrong theme. Precedence: explicit stored choice ('light'|'dark') > system
      hint (prefers-color-scheme) > default dark. Mirrors resolveInitialTheme in
      src/theme.ts (kept in sync; this copy cannot import a module). Any failure
      falls back to dark, the product default.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('cogeto-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
